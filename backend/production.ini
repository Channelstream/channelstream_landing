###
# app configuration
# https://docs.pylonsproject.org/projects/pyramid/en/latest/narr/environment.html
###

[app:main]
use = egg:channelstream_landing

pyramid.reload_templates = false
pyramid.debug_authorization = false
pyramid.debug_notfound = false
pyramid.debug_routematch = false
pyramid.default_locale_name = en


statics.dir = %(here)s/static
statics.build_dir = %(here)s/static_build

# demo app

demo.url = http://127.0.0.1:6544

# channelstream

channelstream.ws_url = ws://127.0.0.1:8000
channelstream.public_url = http://127.0.0.1:8000
channelstream.url = http://127.0.0.1:8000
channelstream.secret = secret

###
# wsgi server configuration
###

[server:main]
use = egg:waitress#main
listen = *:6543
# Trust X-Forwarded-Proto from a TLS-terminating proxy (nginx, Traefik,
# Caddy, Cloudflare, etc.) so request.scheme returns 'https' on public
# HTTPS requests. Without this, request.static_url / request.route_url
# emit http:// URLs and browsers block them as mixed content. Old
# waitress 1.x did this implicitly; 2.0+ require explicit configuration.
trusted_proxy = *
trusted_proxy_count = 1
trusted_proxy_headers = x-forwarded-for x-forwarded-host x-forwarded-proto x-forwarded-port

###
# logging configuration
# https://docs.pylonsproject.org/projects/pyramid/en/latest/narr/logging.html
###

[loggers]
keys = root, channelstream_landing

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_channelstream_landing]
level = WARN
handlers =
qualname = channelstream_landing

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s:%(lineno)s][%(threadName)s] %(message)s
